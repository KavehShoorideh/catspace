<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>catspace — eval calibration &amp; ablation dashboard</title>
<style>
  body { background:#14161a; color:#cfd3da; font:13px/1.4 -apple-system, "Segoe UI", sans-serif; margin:14px; }
  h1 { font-size:15px; margin:0 0 8px; color:#e8eaee; }
  .lg { font-size:11px; color:#8a90a0; }
  #models { margin-bottom:10px; }
  #models button { background:#22252c; color:#cfd3da; border:1px solid #3a3f49; border-radius:4px;
                   margin:0 4px 4px 0; padding:3px 9px; cursor:pointer; }
  #models button.off { opacity:0.3; }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .panel { background:#1b1e24; border:1px solid #2a2e36; border-radius:6px; padding:8px; }
  .panel h2 { font-size:12px; margin:0 0 4px; color:#8a90a0; font-weight:normal; }
  svg.chart { width:100%; height:230px; }
  #status { font-size:11px; color:#8a90a0; min-height:16px; margin:8px 0; }
  table { width:100%; border-collapse:collapse; font-size:11px; margin-top:6px; }
  th, td { text-align:left; padding:2px 6px; border-bottom:1px solid #23262e; }
  .swatch { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:4px; }
</style>
</head>
<body>
<h1 id="title"></h1>
<div id="models"></div>
<div id="status"></div>
<div class="grid">
  <div class="panel"><h2>ROC (won vs lost)</h2><svg class="chart" id="c-roc" viewBox="0 0 380 230"></svg></div>
  <div class="panel"><h2>reliability (predicted vs empirical P(win))</h2><svg class="chart" id="c-rel" viewBox="0 0 380 230"></svg></div>
  <div class="panel"><h2>per-ply AUC</h2><svg class="chart" id="c-ply" viewBox="0 0 380 230"></svg></div>
  <div class="panel"><h2>per-Elo AUC</h2><svg class="chart" id="c-elo" viewBox="0 0 380 230"></svg></div>
  <div class="panel"><h2>E_norm vs Stockfish winprob</h2><svg class="chart" id="c-norm" viewBox="0 0 380 230"></svg></div>
  <div class="panel"><h2>summary</h2>
    <table id="tbl"><thead><tr><th>model</th><th>AUC</th><th>Spearman</th></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<script>
const DATA = /*__DATA__*/;
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs) { const e = document.createElementNS(NS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
const COLORS = { F: "#7aa2ff", B: "#ff7a9c", FB: "#c792ea", baseline: "#8a90a0" };
const DASH = { F: null, B: null, FB: null, baseline: "4,3" };
const active = {}; DATA.models.forEach(m => active[m] = true);

const W = 380, H = 230, PAD = 30;
function axes(svg, x0, x1, y0, y1) {
  svg.appendChild(el("line", { x1: PAD, x2: W - 8, y1: H - PAD, y2: H - PAD, stroke: "#2a3542" }));
  svg.appendChild(el("line", { x1: PAD, x2: PAD, y1: 8, y2: H - PAD, stroke: "#2a3542" }));
  const sx = v => PAD + (W - PAD - 8) * (v - x0) / ((x1 - x0) || 1);
  const sy = v => H - PAD - (H - PAD - 8) * (v - y0) / ((y1 - y0) || 1);
  return { sx, sy };
}

function drawROC() {
  const svg = document.getElementById("c-roc"); svg.innerHTML = "";
  const { sx, sy } = axes(svg, 0, 1, 0, 1);
  svg.appendChild(el("line", { x1: sx(0), y1: sy(0), x2: sx(1), y2: sy(1), stroke: "#2a3542", "stroke-dasharray": "3,3" }));
  DATA.models.forEach(m => {
    if (!active[m]) return;
    const r = DATA.roc[m];
    const d = r.fpr.map((f, i) => (i ? "L" : "M") + sx(f) + " " + sy(r.tpr[i])).join(" ");
    svg.appendChild(el("path", { d, fill: "none", stroke: COLORS[m], "stroke-width": 1.6 }));
  });
}

function drawReliability() {
  const svg = document.getElementById("c-rel"); svg.innerHTML = "";
  const { sx, sy } = axes(svg, 0, 1, 0, 1);
  svg.appendChild(el("line", { x1: sx(0), y1: sy(0), x2: sx(1), y2: sy(1), stroke: "#2a3542", "stroke-dasharray": "3,3" }));
  DATA.models.forEach(m => {
    if (!active[m]) return;
    const r = DATA.reliability[m];
    const pts = r.mean_pred.map((p, i) => [p, r.mean_emp[i]]).filter(p => p[0] !== null);
    const d = pts.map((p, i) => (i ? "L" : "M") + sx(p[0]) + " " + sy(p[1])).join(" ");
    svg.appendChild(el("path", { d, fill: "none", stroke: COLORS[m], "stroke-width": 1.6 }));
    pts.forEach(p => svg.appendChild(el("circle", { cx: sx(p[0]), cy: sy(p[1]), r: 2.2, fill: COLORS[m] })));
  });
}

function drawBars(id, labels, valuesByModel) {
  const svg = document.getElementById(id); svg.innerHTML = "";
  const shown = DATA.models.filter(m => active[m]);
  const { sy } = axes(svg, 0, 1, 0, 1);
  svg.appendChild(el("line", { x1: PAD, x2: W - 8, y1: sy(0), y2: sy(0), stroke: "#2a3542" }));
  const groupW = (W - PAD - 8) / labels.length;
  const barW = groupW / (shown.length + 1);
  labels.forEach((lab, gi) => {
    shown.forEach((m, mi) => {
      const v = valuesByModel[m][gi];
      if (v === null || v === undefined) return;
      const x = PAD + gi * groupW + mi * barW + barW * 0.3;
      const y = sy(v), y0 = sy(0.5);
      svg.appendChild(el("rect", { x, y: Math.min(y, y0), width: barW * 0.8, height: Math.abs(y0 - y), fill: COLORS[m] }));
    });
    const t = el("text", { x: PAD + gi * groupW + groupW / 2, y: H - PAD + 12, fill: "#5a6070", "font-size": 8, "text-anchor": "middle" });
    t.textContent = lab;
    svg.appendChild(t);
  });
  const t5 = el("text", { x: 4, y: sy(0.5) + 3, fill: "#5a6070", "font-size": 8 });
  t5.textContent = "0.5";
  svg.appendChild(t5);
}

function drawNormScatter() {
  const svg = document.getElementById("c-norm"); svg.innerHTML = "";
  const { sx, sy } = axes(svg, 0, 1, 0, 1);
  svg.appendChild(el("line", { x1: sx(0), y1: sy(0), x2: sx(1), y2: sy(1), stroke: "#2a3542", "stroke-dasharray": "3,3" }));
  DATA.models.forEach(m => {
    if (!active[m]) return;
    const s = DATA.norm_scatter[m];
    s.sf.forEach((sf, i) => {
      svg.appendChild(el("circle", { cx: sx(sf), cy: sy(s.e_norm[i]), r: 1.4, fill: COLORS[m], opacity: 0.45 }));
    });
  });
}

function drawAll() {
  drawROC(); drawReliability();
  drawBars("c-ply", DATA.ply_buckets, DATA.ply_auc);
  drawBars("c-elo", DATA.elo_bins.map(b => b < 10 ? `${800 + 200 * b}` : "?"), DATA.elo_auc);
  drawNormScatter();
}

document.getElementById("title").textContent = DATA.meta.title;
const modelsDiv = document.getElementById("models");
DATA.models.forEach(m => {
  const b = document.createElement("button");
  b.innerHTML = `<span class="swatch" style="background:${COLORS[m]}"></span>${m}`;
  b.onclick = () => { active[m] = !active[m]; b.classList.toggle("off", !active[m]); drawAll(); };
  modelsDiv.appendChild(b);
});

const tbody = document.getElementById("tbody");
DATA.models.forEach(m => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td><span class="swatch" style="background:${COLORS[m]}"></span>${m}</td>` +
    `<td>${DATA.auc[m].toFixed(3)}</td><td>${DATA.spearman[m].toFixed(3)}</td>`;
  tbody.appendChild(tr);
});

drawAll();
</script>
</body>
</html>
